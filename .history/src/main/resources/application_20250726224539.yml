spring:
  application:
    name: springboot-grpc-rest-demo
  
  # Enable colorized console output
  output:
    ansi:
      enabled: always
  
  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
    
  h2:
    console:
      enabled: true
      path: /h2-console
      
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
        
  # SQL initialization
  sql:
    init:
      mode: always
    
  # Server Configuration
server:
  port: 8085
  
# gRPC Configuration (disabled for JWT testing)
# grpc:
#   server:
#     port: 9090
#     security:
#       enabled: false
    
# Note: gRPC server configuration disabled for JWT testing
    
# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    
# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-must-be-at-least-32-characters-long-for-production}
  expiration: 86400000 # 24 hours in milliseconds

# Security Configuration
security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain.com}
  rate-limit:
    requests-per-minute: 10
  account-lockout:
    max-attempts: 5
    lock-duration-minutes: 15
  password:
    min-length: 8
  ssrf:
    allowed-hosts: ${SSRF_ALLOWED_HOSTS:localhost,127.0.0.1,::1}
    allowed-schemes: ${SSRF_ALLOWED_SCHEMES:http,https}

# Logging Configuration
logging:
  level:
    root: INFO
    # Application specific logging
    com.demo.springboot: DEBUG
    com.demo.springboot.controller: DEBUG
    com.demo.springboot.service: DEBUG
    com.demo.springboot.repository: DEBUG
    com.demo.springboot.config: DEBUG
    com.demo.springboot.entity: DEBUG
    
    # Database and JPA logging
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.type.descriptor.sql.BasicExtractor: TRACE
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction: DEBUG
    
    # HTTP/REST verbose logging
    org.springframework.web: DEBUG
    org.springframework.web.servlet: DEBUG
    org.springframework.web.servlet.mvc: DEBUG
    org.springframework.web.servlet.mvc.method.annotation: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.filter: DEBUG
    
    # Security logging
    org.springframework.security: DEBUG
    org.springframework.security.web: DEBUG
    org.springframework.security.web.FilterChainProxy: DEBUG
    org.springframework.security.authentication: DEBUG
    org.springframework.security.access: DEBUG
    
    # Request/Response body logging
    org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor: DEBUG
    org.springframework.web.servlet.mvc.method.annotation.HttpEntityMethodProcessor: DEBUG
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: DEBUG
    
    # Validation logging
    org.springframework.validation: DEBUG
    org.hibernate.validator: DEBUG
    
    # Jackson JSON processing
    com.fasterxml.jackson: DEBUG
    
    # gRPC verbose logging
    io.grpc: DEBUG
    net.devh.boot.grpc: DEBUG
    grpc: DEBUG
    
    # Netty logging for gRPC
    io.netty: INFO
    
    # HTTP client logging
    org.apache.http: DEBUG
    
    # Bean creation and dependency injection
    org.springframework.beans: DEBUG
    org.springframework.context: DEBUG
    
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
